<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Wedge's World of Birds</title>
  <style>
    :root {
      --bg: #0a0d10;
      --bg-tile: #161a1f;
      --bg-elev: #1d222a;
      --fg: #e8e8e8;
      --fg-dim: #8a8f96;
      --border: #232830;
      --accent-live: #3ad06a;
      --accent-upcoming: #f5c451;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overscroll-behavior: none;
    }
    #titlebar {
      padding: 22px 24px 18px;
    }
    #titlebar h1 {
      margin: 0;
      font-family: "Hoefler Text", "Iowan Old Style", "Palatino", "Georgia", serif;
      font-style: italic;
      font-weight: 600;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 0.005em;
      line-height: 1.1;
      background: linear-gradient(110deg,
        #0d6e3a 0%,
        #3ad06a 18%,
        #7fffb2 32%,
        #d8fff0 42%,
        #50e3c2 55%,
        #2bbf9b 70%,
        #0f7a5c 88%,
        #0d6e3a 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      filter:
        drop-shadow(0 0 14px rgba(58, 208, 106, 0.32))
        drop-shadow(0 0 28px rgba(80, 227, 194, 0.18))
        drop-shadow(0 2px 6px rgba(0, 0, 0, 0.65));
      animation: shimmer 9s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      #titlebar h1 { animation: none; }
    }
    main {
      padding: 8px 16px 140px;
    }
    .status {
      color: var(--fg-dim);
      font-size: 13px;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .tile {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--bg-tile);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid var(--border);
      transition: opacity 120ms ease, filter 120ms ease, transform 80ms ease;
    }
    .tile:active { transform: scale(0.98); }
    .tile img.thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tile .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-size: 14px;
      color: var(--fg-dim);
      background: linear-gradient(135deg, #1a2028, #0e1216);
    }
    .tile .overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 10px 12px 12px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.78) 60%, rgba(0,0,0,0.92) 100%);
      pointer-events: none;
    }
    .tile .name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.25;
      color: var(--fg);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tile .source {
      margin-top: 2px;
      font-size: 11px;
      color: var(--fg-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tile .dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45);
    }
    .tile .dot.live { background: var(--accent-live); box-shadow: 0 0 0 2px rgba(0,0,0,0.45), 0 0 10px var(--accent-live); }
    .tile .dot.upcoming { background: var(--accent-upcoming); }
    .tile .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(0,0,0,0.6);
      color: var(--fg-dim);
      backdrop-filter: blur(4px);
    }
    .tile.offline { opacity: 0.4; filter: grayscale(0.6); }
    .tile.upcoming .badge { color: var(--accent-upcoming); }
    .tile.action {
      background: var(--bg-elev);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--fg);
    }
    .tile.action svg {
      width: 30px;
      height: 30px;
      stroke: var(--fg);
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tile.action .label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }
    #actionDock {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
    }
    #actionDock .tile.action {
      width: 108px;
      height: 108px;
      aspect-ratio: auto;
      background: rgba(29, 34, 42, 0.92);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    @media (max-width: 540px) {
      #actionDock { bottom: 12px; right: 12px; gap: 8px; }
      #actionDock .tile.action { width: 92px; height: 92px; }
      #actionDock .tile.action svg { width: 26px; height: 26px; }
    }
    @media (max-width: 540px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .tile .name { font-size: 13px; }
    }
    #player {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
    }
    #player[hidden] { display: none; }
    #player iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Transparent click-catcher over the iframe so taps exit playback. */
    #player .tap-catcher {
      position: absolute;
      inset: 0;
      background: transparent;
      cursor: pointer;
    }
    dialog.modal {
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--fg);
      border-radius: var(--radius);
      padding: 0;
      max-width: 92vw;
      width: 420px;
    }
    dialog.modal::backdrop {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }
    dialog.modal .modal-body {
      padding: 20px 22px 18px;
    }
    dialog.modal h2 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }
    dialog.modal label {
      display: block;
      font-size: 12px;
      color: var(--fg-dim);
      margin: 12px 0 6px;
    }
    dialog.modal input[type=text],
    dialog.modal input[type=url] {
      width: 100%;
      padding: 12px 12px;
      font-size: 16px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
    }
    dialog.modal input:focus { border-color: var(--accent-live); }
    dialog.modal .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      justify-content: flex-end;
    }
    dialog.modal button {
      font-size: 14px;
      padding: 12px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-tile);
      color: var(--fg);
      cursor: pointer;
      min-width: 88px;
    }
    dialog.modal button.primary {
      background: var(--accent-live);
      color: #062512;
      border-color: var(--accent-live);
      font-weight: 600;
    }
    dialog.modal .error {
      margin-top: 10px;
      color: #ff8a7a;
      font-size: 13px;
      min-height: 1em;
    }
    dialog.modal .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 6px;
    }
    dialog.modal .options button {
      padding: 16px 12px;
      font-size: 15px;
      min-width: 0;
    }
  </style>
</head>
<body>
  <header id="titlebar"><h1>Wedge's World of Birds</h1></header>
  <main id="dashboard">
    <p class="status">Loading…</p>
  </main>
  <div id="actionDock"></div>
  <section id="player" hidden>
    <iframe allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    <div class="tap-catcher" id="tapCatcher" aria-label="Exit player"></div>
  </section>
  <dialog id="shuffleModal" class="modal">
    <div class="modal-body">
      <h2>Shuffle interval</h2>
      <div class="options" id="shuffleOptions">
        <button type="button" data-minutes="1">1 min</button>
        <button type="button" data-minutes="5">5 min</button>
        <button type="button" data-minutes="15">15 min</button>
        <button type="button" data-minutes="30">30 min</button>
        <button type="button" data-minutes="60">60 min</button>
      </div>
      <div class="actions">
        <button type="button" id="shuffleCancel">Cancel</button>
      </div>
    </div>
  </dialog>
  <dialog id="addModal" class="modal">
    <form method="dialog" class="modal-body" id="addForm">
      <h2>Add a stream</h2>
      <label for="addUrl">URL</label>
      <input id="addUrl" type="url" inputmode="url" autocomplete="off"
             placeholder="https://www.youtube.com/watch?v=…" required>
      <label for="addName">Name (optional)</label>
      <input id="addName" type="text" autocomplete="off" placeholder="e.g. Cornell FeederWatch">
      <div class="error" id="addError"></div>
      <div class="actions">
        <button type="button" value="cancel" id="addCancel">Cancel</button>
        <button type="submit" class="primary">Add</button>
      </div>
    </form>
  </dialog>
  <script src="config.local.js" onerror="void 0"></script>
  <script>
    'use strict';

    // ---- Config ----------------------------------------------------------
    // Defaults live here; secrets (API key) load from config.local.js below,
    // which is gitignored. To enable YouTube liveness checks locally:
    //   cp config.local.example.js config.local.js  (then paste your key)
    const CONFIG = {
      youtubeApiKey: null,
      livenessCacheMinutes: 15,
      refreshIntervalMinutes: 60,
      twitchParent: location.hostname || 'localhost',
    };
    if (window.WWOB_CONFIG) Object.assign(CONFIG, window.WWOB_CONFIG);

    const LS_KEYS = {
      streams: 'wwob.streams.v1',
      liveness: 'wwob.liveness.v1',
    };

    // ---- State -----------------------------------------------------------
    const state = {
      streams: [],
      liveness: {},
      view: 'dashboard',
      shuffle: { active: false, intervalMs: 0, timerId: null, lastId: null },
    };

    // ---- Storage helpers -------------------------------------------------
    function loadJson(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        console.warn('[wwob] localStorage read failed for', key, e);
        return null;
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {
        console.warn('[wwob] localStorage write failed for', key, e);
      }
    }

    // ---- Derived helpers -------------------------------------------------
    function streamKey(stream) {
      // Cache key: prefer videoId for youtube/twitch, fall back to stream.id.
      return stream.videoId || stream.id;
    }

    function statusFor(stream) {
      const cached = state.liveness[streamKey(stream)];
      return cached?.status || 'unknown';
    }

    function offlineReasonFor(stream) {
      const cached = state.liveness[streamKey(stream)];
      return cached?.reason || null;
    }

    // ---- Rendering -------------------------------------------------------
    const STATUS_RANK = { live: 0, upcoming: 1, unknown: 2, offline: 3 };

    function sortStreams(list) {
      // Stable sort by status bucket, preserving seed order within each bucket.
      return list
        .map((s, i) => ({ s, i, rank: STATUS_RANK[statusFor(s)] ?? 2 }))
        .sort((a, b) => a.rank - b.rank || a.i - b.i)
        .map(x => x.s);
    }

    function thumbnailUrl(stream) {
      if (stream.platform === 'youtube') {
        return 'https://img.youtube.com/vi/' + stream.videoId + '/maxresdefault.jpg';
      }
      if (stream.platform === 'twitch') {
        const minute = Math.floor(Date.now() / 60000);
        return 'https://static-cdn.jtvnw.net/previews-ttv/live_user_' +
          stream.videoId + '-440x248.jpg?t=' + minute;
      }
      return null; // iframe: placeholder
    }

    function tileEl(stream) {
      const status = statusFor(stream);
      const reason = offlineReasonFor(stream);
      const el = document.createElement('div');
      el.className = 'tile';
      el.classList.add(status);
      el.dataset.streamId = stream.id;

      const thumb = thumbnailUrl(stream);
      if (thumb) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.alt = stream.name;
        img.src = thumb;
        if (stream.platform === 'youtube') {
          img.addEventListener('error', () => {
            // maxres often missing — fall back to hqdefault once.
            if (!img.dataset.fallback) {
              img.dataset.fallback = '1';
              img.src = 'https://img.youtube.com/vi/' + stream.videoId + '/hqdefault.jpg';
            }
          });
        }
        el.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.textContent = stream.name;
        el.appendChild(ph);
      }

      if (status === 'live') {
        const dot = document.createElement('span');
        dot.className = 'dot live';
        dot.title = 'Live';
        el.appendChild(dot);
      } else if (status === 'upcoming') {
        const dot = document.createElement('span');
        dot.className = 'dot upcoming';
        dot.title = 'Upcoming';
        el.appendChild(dot);
        const b = document.createElement('span');
        b.className = 'badge';
        b.textContent = 'Soon';
        el.appendChild(b);
      } else if (status === 'offline' && reason === 'off-season') {
        const b = document.createElement('span');
        b.className = 'badge';
        b.textContent = 'Off-season';
        el.appendChild(b);
      }

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = stream.name;
      overlay.appendChild(name);
      if (stream.source) {
        const src = document.createElement('div');
        src.className = 'source';
        src.textContent = stream.source;
        overlay.appendChild(src);
      }
      el.appendChild(overlay);

      return el;
    }

    function actionTileEl(action, label, svgPath) {
      const el = document.createElement('div');
      el.className = 'tile action';
      el.dataset.action = action;
      el.innerHTML =
        '<svg viewBox="0 0 40 40" aria-hidden="true">' + svgPath + '</svg>' +
        '<div class="label">' + label + '</div>';
      return el;
    }

    const ICON_PLUS = '<line x1="20" y1="10" x2="20" y2="30"/><line x1="10" y1="20" x2="30" y2="20"/>';
    const ICON_SHUFFLE =
      '<path d="M6 12 H14 L26 28 H34"/>' +
      '<path d="M6 28 H14 L18 23"/>' +
      '<path d="M22 17 L26 12 H34"/>' +
      '<polyline points="30,8 34,12 30,16"/>' +
      '<polyline points="30,24 34,28 30,32"/>';

    // ---- URL parsing -----------------------------------------------------
    function parseStreamUrl(raw) {
      const trimmed = (raw || '').trim();
      if (!trimmed) return null;

      let u;
      try { u = new URL(trimmed); }
      catch { return { platform: 'iframe', url: trimmed }; }

      const host = u.hostname.replace(/^www\./, '').toLowerCase();
      const segs = u.pathname.split('/').filter(Boolean);

      // YouTube variants
      if (host === 'youtube.com' || host.endsWith('.youtube.com')) {
        const v = u.searchParams.get('v');
        if (v) return { platform: 'youtube', videoId: v };
        if (segs[0] === 'embed' && segs[1]) return { platform: 'youtube', videoId: segs[1] };
        if (segs[0] === 'live' && segs[1]) return { platform: 'youtube', videoId: segs[1] };
        if (segs[0] === 'shorts' && segs[1]) return { platform: 'youtube', videoId: segs[1] };
      }
      if (host === 'youtu.be' && segs[0]) {
        return { platform: 'youtube', videoId: segs[0] };
      }

      // Twitch variants
      if (host === 'twitch.tv' || host.endsWith('.twitch.tv')) {
        if (segs[0] === 'videos' && segs[1]) return { platform: 'twitch', videoId: segs[1] };
        if (segs[0]) return { platform: 'twitch', videoId: segs[0] };
      }

      return { platform: 'iframe', url: trimmed };
    }

    function makeStreamId(name, parsed) {
      const base = (name || parsed.videoId || parsed.url || 'stream')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40);
      let id = base || 'stream';
      let n = 1;
      const taken = new Set(state.streams.map(s => s.id));
      while (taken.has(id)) {
        n += 1;
        id = base + '-' + n;
      }
      return id;
    }

    function persistStreams() {
      saveJson(LS_KEYS.streams, { version: 1, streams: state.streams });
    }

    async function addStream({ url, name }) {
      const parsed = parseStreamUrl(url);
      if (!parsed) throw new Error('Please enter a URL.');
      const stream = {
        id: makeStreamId(name, parsed),
        name: (name && name.trim()) || (parsed.videoId ? 'Stream ' + parsed.videoId : 'Stream'),
        platform: parsed.platform,
      };
      if (parsed.videoId) stream.videoId = parsed.videoId;
      if (parsed.url) stream.url = parsed.url;
      state.streams.push(stream);
      persistStreams();
      render();
      // Re-classify (just the new one needs it, but classifyAll skips fresh entries).
      try { await classifyAll(); } catch (e) { console.warn('[wwob] classify after add failed', e); }
      return stream;
    }

    function openAddModal() {
      const dlg = document.getElementById('addModal');
      document.getElementById('addUrl').value = '';
      document.getElementById('addName').value = '';
      document.getElementById('addError').textContent = '';
      if (typeof dlg.showModal === 'function') dlg.showModal();
      else dlg.setAttribute('open', '');
      setTimeout(() => document.getElementById('addUrl').focus(), 0);
    }

    function closeAddModal() {
      const dlg = document.getElementById('addModal');
      if (typeof dlg.close === 'function') dlg.close();
      else dlg.removeAttribute('open');
    }

    // ---- Playback --------------------------------------------------------
    function embedUrl(stream) {
      if (stream.platform === 'youtube') {
        // enablejsapi=1 + origin let us postMessage play/mute commands after
        // the iframe loads, which is the only reliable autoplay path on
        // current YouTube embeds.
        return 'https://www.youtube.com/embed/' + stream.videoId +
          '?autoplay=1&mute=1&controls=0&rel=0&playsinline=1' +
          '&enablejsapi=1&origin=' + encodeURIComponent(location.origin);
      }
      if (stream.platform === 'twitch') {
        return 'https://player.twitch.tv/?channel=' + encodeURIComponent(stream.videoId) +
          '&parent=' + encodeURIComponent(CONFIG.twitchParent) +
          '&autoplay=true&muted=true';
      }
      return stream.url;
    }

    function postYouTubeCommand(frame, func) {
      try {
        frame.contentWindow.postMessage(
          JSON.stringify({ event: 'command', func, args: [] }),
          'https://www.youtube.com'
        );
      } catch (e) {
        console.warn('[wwob] yt postMessage failed', e);
      }
    }

    function openPlayer(stream) {
      const player = document.getElementById('player');
      const frame = player.querySelector('iframe');
      // Unhide before setting src — some browsers won't start media on an
      // iframe whose ancestor is display:none at load time.
      player.hidden = false;
      state.view = 'player';
      frame.src = embedUrl(stream);

      if (stream.platform === 'youtube') {
        // Force-start playback after the iframe finishes loading. Sending
        // mute first satisfies the autoplay-with-sound restriction.
        frame.addEventListener('load', function onLoad() {
          frame.removeEventListener('load', onLoad);
          setTimeout(() => {
            postYouTubeCommand(frame, 'mute');
            postYouTubeCommand(frame, 'playVideo');
          }, 250);
        });
      }
    }

    function closePlayer() {
      const player = document.getElementById('player');
      const frame = player.querySelector('iframe');
      frame.src = 'about:blank';
      player.hidden = true;
      state.view = 'dashboard';
      stopShuffle();
    }

    // ---- Shuffle ---------------------------------------------------------
    function liveStreams() {
      return state.streams.filter(s => statusFor(s) === 'live');
    }

    function pickShuffleStream() {
      const pool = liveStreams();
      if (pool.length === 0) return null;
      if (pool.length === 1) return pool[0];
      // Avoid an immediate repeat.
      let next;
      let tries = 0;
      do {
        next = pool[Math.floor(Math.random() * pool.length)];
        tries += 1;
      } while (next.id === state.shuffle.lastId && tries < 8);
      state.shuffle.lastId = next.id;
      return next;
    }

    function startShuffle(minutes) {
      const first = pickShuffleStream();
      if (!first) {
        const errDlg = document.getElementById('shuffleModal');
        // No live streams — bail with a console hint; modal stays open.
        console.warn('[wwob] no live streams to shuffle');
        return false;
      }
      state.shuffle.active = true;
      state.shuffle.intervalMs = minutes * 60 * 1000;
      openPlayer(first);
      state.view = 'shuffle';
      state.shuffle.timerId = setInterval(() => {
        const s = pickShuffleStream();
        if (s) openPlayer(s);
      }, state.shuffle.intervalMs);
      return true;
    }

    function stopShuffle() {
      if (state.shuffle.timerId) clearInterval(state.shuffle.timerId);
      state.shuffle.active = false;
      state.shuffle.timerId = null;
    }

    function openShuffleModal() {
      const dlg = document.getElementById('shuffleModal');
      if (typeof dlg.showModal === 'function') dlg.showModal();
      else dlg.setAttribute('open', '');
    }

    function closeShuffleModal() {
      const dlg = document.getElementById('shuffleModal');
      if (typeof dlg.close === 'function') dlg.close();
      else dlg.removeAttribute('open');
    }

    function render() {
      const dash = document.getElementById('dashboard');
      const dock = document.getElementById('actionDock');
      const grid = document.createElement('div');
      grid.className = 'grid';
      const sorted = sortStreams(state.streams);
      for (const s of sorted) grid.appendChild(tileEl(s));
      dash.replaceChildren(grid);
      dock.replaceChildren(
        actionTileEl('add', 'Add', ICON_PLUS),
        actionTileEl('shuffle', 'Shuffle', ICON_SHUFFLE),
      );
    }

    // ---- Liveness detection ---------------------------------------------
    function isCacheFresh(entry) {
      if (!entry?.checkedAt) return false;
      const ageMs = Date.now() - new Date(entry.checkedAt).getTime();
      return ageMs < CONFIG.livenessCacheMinutes * 60 * 1000;
    }

    function classifyByActiveMonths(stream) {
      if (!Array.isArray(stream.activeMonths) || stream.activeMonths.length === 0) {
        return { status: 'unknown', reason: null };
      }
      const month = new Date().getMonth() + 1; // 1-indexed
      if (stream.activeMonths.includes(month)) {
        return { status: 'unknown', reason: null };
      }
      return { status: 'offline', reason: 'off-season' };
    }

    function chunk(arr, n) {
      const out = [];
      for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
      return out;
    }

    async function classifyYouTubeBatch(videoIds) {
      // One Data API call covers up to 50 ids. Returns map: videoId -> status.
      const out = {};
      if (!CONFIG.youtubeApiKey || videoIds.length === 0) return null;
      try {
        for (const batch of chunk(videoIds, 50)) {
          const url = 'https://www.googleapis.com/youtube/v3/videos' +
            '?part=snippet&id=' + batch.join(',') +
            '&key=' + encodeURIComponent(CONFIG.youtubeApiKey);
          const res = await fetch(url);
          if (!res.ok) {
            console.warn('[wwob] youtube api failed', res.status, await res.text());
            return null;
          }
          const data = await res.json();
          const seen = new Set();
          for (const item of (data.items || [])) {
            seen.add(item.id);
            const lbc = item.snippet?.liveBroadcastContent;
            if (lbc === 'live') out[item.id] = 'live';
            else if (lbc === 'upcoming') out[item.id] = 'upcoming';
            else out[item.id] = 'offline'; // 'none' = video exists but not live
          }
          // Missing ids (deleted / private) → offline.
          for (const id of batch) if (!seen.has(id)) out[id] = 'offline';
        }
        return out;
      } catch (e) {
        console.warn('[wwob] youtube api error', e);
        return null;
      }
    }

    async function classifyAll({ force = false } = {}) {
      const now = new Date().toISOString();
      const next = { ...state.liveness };

      // Partition streams that need a check.
      const stale = state.streams.filter(s => force || !isCacheFresh(next[streamKey(s)]));
      if (stale.length === 0) return;

      const youtubeIds = stale
        .filter(s => s.platform === 'youtube' && s.videoId)
        .map(s => s.videoId);

      let ytResults = null;
      if (youtubeIds.length > 0) {
        ytResults = await classifyYouTubeBatch(youtubeIds);
      }

      for (const s of stale) {
        const key = streamKey(s);
        let status = 'unknown';
        let reason = null;

        if (s.platform === 'youtube' && ytResults && ytResults[s.videoId] !== undefined) {
          status = ytResults[s.videoId];
        } else {
          // No API result available: fall back to activeMonths heuristic.
          const fallback = classifyByActiveMonths(s);
          status = fallback.status;
          reason = fallback.reason;
        }
        next[key] = { status, reason, checkedAt: now };
      }

      state.liveness = next;
      saveJson(LS_KEYS.liveness, next);
      render();
    }

    function scheduleRefresh() {
      const ms = CONFIG.refreshIntervalMinutes * 60 * 1000;
      setInterval(() => classifyAll({ force: true }).catch(e => console.warn('[wwob] refresh failed', e)),
        ms);
    }

    // ---- Bootstrap -------------------------------------------------------
    async function fetchSeedStreams() {
      const res = await fetch('streams.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error('streams.json fetch failed: ' + res.status);
      const data = await res.json();
      if (!Array.isArray(data.streams)) throw new Error('streams.json: missing streams[]');
      return data.streams;
    }

    async function loadStreams() {
      const cached = loadJson(LS_KEYS.streams);
      const cachedList = (cached && Array.isArray(cached.streams)) ? cached.streams : [];

      // First load: no cache yet -> seed from streams.json.
      if (cachedList.length === 0) {
        const seeds = await fetchSeedStreams();
        saveJson(LS_KEYS.streams, { version: 1, streams: seeds });
        return seeds;
      }

      // Subsequent loads: reconcile the cached list with the latest seeds.
      //   - User-added streams (id not in seeds): preserved as-is.
      //   - Seeds new since last load (id not in cache): appended.
      //   - Seeds whose fields shifted (e.g. rotated videoId): the cached
      //     entry's seed-managed fields are refreshed in place.
      // If the seed fetch fails, fall back to the cache untouched.
      let seeds;
      try { seeds = await fetchSeedStreams(); }
      catch (e) { console.warn('[wwob] seed fetch failed, using cache only', e); return cachedList; }

      const seedById = new Map(seeds.map(s => [s.id, s]));
      const cachedIds = new Set(cachedList.map(s => s.id));

      // Fields that come from streams.json. Anything else on a cached
      // entry (transient runtime data, future user customizations) is left
      // alone.
      const SEED_FIELDS = ['name', 'description', 'platform', 'videoId', 'url', 'source', 'activeMonths'];

      let updated = 0;
      const merged = cachedList.map(c => {
        const seed = seedById.get(c.id);
        if (!seed) return c; // user-added or no longer in seeds
        const next = { ...c };
        let changed = false;
        for (const f of SEED_FIELDS) {
          // Treat missing on seed side as "remove this field".
          if (seed[f] === undefined) {
            if (next[f] !== undefined) { delete next[f]; changed = true; }
          } else if (JSON.stringify(next[f]) !== JSON.stringify(seed[f])) {
            next[f] = seed[f];
            changed = true;
          }
        }
        if (changed) updated += 1;
        return next;
      });

      const added = seeds.filter(s => !cachedIds.has(s.id));
      const final = merged.concat(added);

      if (added.length === 0 && updated === 0) return cachedList;

      saveJson(LS_KEYS.streams, { version: 1, streams: final });
      if (added.length > 0) console.log('[wwob] merged', added.length, 'new seed(s):', added.map(s => s.id));
      if (updated > 0) console.log('[wwob] refreshed', updated, 'seed entry/entries from streams.json');
      return final;
    }

    // ---- Event delegation -----------------------------------------------
    function streamById(id) {
      return state.streams.find(s => s.id === id);
    }

    function wireEvents() {
      function handleTileClick(ev) {
        const tile = ev.target.closest('.tile');
        if (!tile) return;
        if (tile.dataset.action === 'add') {
          openAddModal();
          return;
        }
        if (tile.dataset.action === 'shuffle') {
          openShuffleModal();
          return;
        }
        const id = tile.dataset.streamId;
        const stream = streamById(id);
        if (stream) openPlayer(stream);
      }
      document.getElementById('dashboard').addEventListener('click', handleTileClick);
      document.getElementById('actionDock').addEventListener('click', handleTileClick);

      document.getElementById('tapCatcher').addEventListener('click', closePlayer);

      const addForm = document.getElementById('addForm');
      addForm.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const url = document.getElementById('addUrl').value;
        const name = document.getElementById('addName').value;
        const errEl = document.getElementById('addError');
        errEl.textContent = '';
        try {
          await addStream({ url, name });
          closeAddModal();
        } catch (e) {
          errEl.textContent = e.message || String(e);
        }
      });
      document.getElementById('addCancel').addEventListener('click', closeAddModal);

      document.getElementById('shuffleOptions').addEventListener('click', (ev) => {
        const btn = ev.target.closest('button[data-minutes]');
        if (!btn) return;
        const minutes = parseInt(btn.dataset.minutes, 10);
        if (startShuffle(minutes)) closeShuffleModal();
      });
      document.getElementById('shuffleCancel').addEventListener('click', closeShuffleModal);
    }

    async function init() {
      const dash = document.getElementById('dashboard');
      try {
        state.streams = await loadStreams();
        state.liveness = loadJson(LS_KEYS.liveness) || {};
        render();
        wireEvents();
        console.log('[wwob] streams loaded', state.streams.length);
        // Kick off liveness in background; don't block first render.
        classifyAll().catch(e => console.warn('[wwob] classifyAll failed', e));
        scheduleRefresh();
      } catch (e) {
        console.error('[wwob] init failed', e);
        dash.innerHTML = '<p class="status">Could not load streams: ' + e.message + '</p>';
      }
    }

    init();
  </script>
</body>
</html>
